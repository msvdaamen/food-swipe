name: Monorepo CI/CD

run-name: ${{ github.event_name }} · ${{ github.ref_name }}

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend API
    uses: ./.github/workflows/backend.yml

  admin:
    name: Admin Web
    uses: ./.github/workflows/admin.yml

  migrate:
    name: Database / Migrate
    needs: [backend, admin]
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter @food-swipe/backend

      - name: Run migrations
        run: bun run --filter @food-swipe/backend migrate

  deploy_backend:
    name: Backend API / Deploy
    needs: [backend, admin, migrate]
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter @food-swipe/backend

      - name: Deploy backend
        run: bun run --filter @food-swipe/backend deploy

  deploy_admin:
    name: Admin Web / Deploy
    needs: [backend, admin, migrate]
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter @food-swipe/admin

      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: admin-dist
          path: apps/admin/dist

      - name: Deploy admin
        run: bun run --filter @food-swipe/admin deploy
