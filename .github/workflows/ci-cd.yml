name: Monorepo CI/CD

run-name: Monorepo CI/CD · ${{ github.event_name }} · ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changed Projects
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - '.github/workflows/ci-cd.yml'
              - '.github/workflows/backend.yml'
              - 'apps/backend/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
            admin:
              - '.github/workflows/ci-cd.yml'
              - '.github/workflows/admin.yml'
              - 'apps/admin/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'

  backend:
    name: Backend API
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/backend.yml

  admin:
    name: Admin Web
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    uses: ./.github/workflows/admin.yml

  deploy_backend:
    name: Backend API / Deploy
    needs: [changes, backend, admin]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.backend == 'true' &&
      needs.backend.result == 'success' &&
      (needs.changes.outputs.admin != 'true' || needs.admin.result == 'success')
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter @food-swipe/backend

      - name: Deploy backend
        run: bun run --filter @food-swipe/backend deploy

  deploy_admin:
    name: Admin Web / Deploy
    needs: [changes, backend, admin]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.admin == 'true' &&
      needs.admin.result == 'success' &&
      (needs.changes.outputs.backend != 'true' || needs.backend.result == 'success')
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter @food-swipe/admin

      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: admin-dist
          path: apps/admin/dist

      - name: Deploy admin
        run: bun run --filter @food-swipe/admin deploy
