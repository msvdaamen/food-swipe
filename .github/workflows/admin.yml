name: Admin Web CI/CD

on:
  workflow_call:

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter @food-swipe/admin

      - name: Check formatting
        run: bun run --filter @food-swipe/admin fmt:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter @food-swipe/admin

      - name: Lint
        run: bun run --filter @food-swipe/admin lint

  test:
    name: Test
    needs: [fmt, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter @food-swipe/admin

      - name: Test
        run: bun run --filter @food-swipe/admin test

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter @food-swipe/admin

      - name: Build
        run: bun run --filter @food-swipe/admin build

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: admin-dist
          path: apps/admin/dist
          if-no-files-found: error